name: Benchmarks

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Benchmark (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout PR
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@0f1b44df7e9cbb178d781a242338dfa5e243ad7f # nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install gdb (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gdb
      - name: Build SPSC benchmarks
        run: cargo +nightly bench --bench spsc --all-features --no-run
        env:
          RUST_BACKTRACE: full
      - name: Run SPSC benchmarks
        run: |
          BENCH_BIN=$(cargo +nightly bench --bench spsc --all-features --no-run --message-format=json 2>/dev/null \
            | jq -r 'select(.executable != null and .target.name == "spsc") | .executable')
          echo "Bench binary: $BENCH_BIN"
          if [ "$RUNNER_OS" = "Linux" ]; then
            # Run under gdb to catch SIGILL with backtrace
            gdb -batch -ex run -ex "thread apply all bt full" -ex quit --args "$BENCH_BIN" --bench || {
              echo "::error::Benchmark crashed. See backtrace above."
              exit 1
            }
          else
            "$BENCH_BIN" --bench
          fi
        env:
          RUST_BACKTRACE: full
      - name: Convert report for CI tracking
        run: |
          jq '[.results[] | {name: .workload, unit: "ns/op", value: .ns_per_op}]' \
            target/bench-report-spsc.json > bench-output.json
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@a7bc2366eda11037936ea57d811a43b3418d3073 # v1.21.0
        with:
          name: SPSC Ring Benchmarks (${{ matrix.os }})
          tool: customSmallerIsBetter
          output-file-path: bench-output.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          alert-threshold: "105%"
          comment-on-alert: true
          fail-on-alert: true
          alert-comment-cc-users: "@mantis-maintainers"
      - name: Upload benchmark results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results-${{ matrix.os }}
          path: |
            target/bench-report-spsc.json
            bench-output.json
