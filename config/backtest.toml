[bot.trend_filter]
enabled = true
fast_period = 20
slow_period = 60
min_trend_strength = 0.0005

[backtest]
start_date = "2025-10-01"
end_date = "2026-03-30"
initial_balance = 50000.0
slippage_bps = 10

[data]
cache_dir = "data"
