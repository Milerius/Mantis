[bot]
mode = "backtest"
min_edge = 0.03
max_position_usdc = 500.0
max_total_exposure_usdc = 50000.0
max_daily_loss_usdc = 10000.0
kelly_fraction = 0.25

[[bot.assets]]
asset = "btc"
enabled = true
timeframes = ["min5", "min15"]

[[bot.assets]]
asset = "eth"
enabled = true
timeframes = ["min5", "min15"]

[[bot.assets]]
asset = "sol"
enabled = true
timeframes = ["min5", "min15"]

[[bot.assets]]
asset = "xrp"
enabled = true
timeframes = ["min5", "min15"]

# Config E
[[bot.strategies]]
type = "early_directional"
max_entry_time_secs = 150
min_spot_magnitude = 0.002
